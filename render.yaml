services:
  - type: web
    name: grandzone-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install && npm run build && npx prisma migrate deploy
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        value: file:./data/prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://grandzone.vercel.app
    disk:
      name: data
      mountPath: /opt/render/project/src/server/prisma/data
      sizeGB: 1
